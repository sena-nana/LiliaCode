<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lilia</title>
    <script>
      // 在 CSS 应用前同步设置 data-theme，避免浅色用户启动时闪一下暗色。
      try {
        var t = localStorage.getItem("lilia.theme");
        if (t === "light" || t === "dark") {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
