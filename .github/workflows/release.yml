name: Publish Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要发布的 tag，例如 v0.1.0-alpha.1。
        required: true
        type: string
      ref:
        description: 要发布的 branch、tag 或 commit。留空时使用 tag。
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Verify workspace
        run: corepack yarn verify

      - name: Verify release metadata
        run: corepack yarn release:check --tag ${{ steps.release_ref.outputs.tag }}

  publish-windows:
    name: Publish Windows bundle
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build and publish Windows bundle
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: corepack yarn tauri
          tagName: ${{ steps.release_ref.outputs.tag }}
          releaseName: LiliaCode ${{ steps.release_ref.outputs.tag }}
          releaseDraft: true
          generateReleaseNotes: true
          assetNamePattern: LiliaCode_[version]_[arch][setup][ext]
          releaseBody: |
            ## 首发发布检查清单

            - [ ] 已确认本 Release 仍是 draft，完成检查前不要正式发布。
            - [ ] 已确认 tag、根 package、desktop package、Cargo 和 Tauri 配置版本一致。
            - [ ] 已确认 Windows 安装包文件名符合 `LiliaCode_<version>_x64-setup.*`。
            - [ ] 已在干净 Windows 环境下载并运行安装包。
            - [ ] 已确认安装后可以启动 LiliaCode，并能打开主窗口。
            - [ ] 已在新的 PowerShell 或 cmd 中运行 `liliacode <测试项目路径>`，确认 LiliaCode 会打开并进入该项目。
            - [ ] 已确认卸载流程可完成，卸载后新的 PowerShell 或 cmd 中 `liliacode` 不再可用。
            - [ ] 已在 Release 说明中保留未签名提示：当前安装包没有代码签名，Windows SmartScreen 警告属于预期风险。
            - [ ] 已在 Release 说明中保留升级提示：当前没有应用内自动更新，升级需要手动下载并安装新版安装包。

            ## Windows 安装验证记录

            - 验证人：
            - 验证日期：
            - Windows 环境：
            - 安装包文件名：
            - 安装：
            - 启动：
            - CLI 入口：
            - 卸载：

            ## 已知限制

            - 当前只发布 Windows 安装包。
            - 当前安装包没有代码签名，Windows SmartScreen 或安全软件提示属于预期风险。
            - 当前不包含 Tauri updater 自动更新能力。
            - 当前不发布 macOS 公证包、macOS 安装包或 Linux 安装包。
