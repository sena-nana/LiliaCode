name: Publish Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要发布的 tag，例如 v0.1.0-alpha.1。
        required: true
        type: string
      ref:
        description: 要发布的 branch、tag 或 commit。留空时使用 tag。
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Verify workspace
        run: corepack yarn verify

      - name: Verify release metadata
        run: corepack yarn release:check --tag ${{ steps.release_ref.outputs.tag }}

      - name: Show sccache stats
        shell: pwsh
        run: "& $env:SCCACHE_PATH --show-stats"

  publish-windows:
    name: Publish Windows bundle
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: 配置 Tauri 签名密钥
        shell: pwsh
        run: |
          if (-not $env:TAURI_UPDATER_PUBKEY) {
            throw "No Tauri updater public key is configured. Set repository variable TAURI_UPDATER_PUBKEY."
          }

          $localSigningKeyPath = Join-Path $env:GITHUB_WORKSPACE "..\\tauri-signing.key"
          $hasLocalSigningKey = Test-Path $localSigningKeyPath
          if ($hasLocalSigningKey) {
            $signingKey = (Get-Content -Raw $localSigningKeyPath).Trim()
            if (-not $signingKey) {
              throw "Signing key file is empty: $localSigningKeyPath"
            }
            "TAURI_SIGNING_PRIVATE_KEY=$signingKey" >> $env:GITHUB_ENV
          } elseif (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") {
            throw "No Tauri signing key is configured. Set secret TAURI_SIGNING_PRIVATE_KEY or keep ../tauri-signing.key in workspace parent dir."
          }

          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}") {
            throw "No Tauri signing key password is configured. Set secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
          }
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $env:GITHUB_ENV

      - name: Build and publish Windows bundle
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: corepack yarn tauri
          tagName: ${{ steps.release_ref.outputs.tag }}
          releaseName: LiliaCode ${{ steps.release_ref.outputs.tag }}
          releaseDraft: true
          generateReleaseNotes: true
          assetNamePattern: LiliaCode_[version]_[arch][setup][ext]
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          releaseBody: |
            ## 首发发布检查清单

            - [ ] 已确认本 Release 仍是 draft，完成检查前不要正式发布。
            - [ ] 已确认 tag、根 package、desktop package、Cargo 和 Tauri 配置版本一致。
            - [ ] 已确认 Windows 安装包文件名符合 `LiliaCode_<version>_x64-setup.*`。
            - [ ] 已确认 Release 说明已写明当前安装包使用 `tauri-signing.key` 完成 Tauri 签名，且未走 PFX 流程。
            - [ ] 已确认 `yarn release:smoke:windows --tag <tag>` 或本地 `yarn release:smoke:windows --installer <安装包路径>` 通过。
            - [ ] smoke 已覆盖安装包安装、启动 LiliaCode、通过 `liliacode <测试项目路径>` 打开项目。
            - [ ] 已确认基础窗口操作正常。
            - [ ] smoke 已覆盖卸载流程，并确认卸载后新的 PowerShell 或 cmd 中 `liliacode` 不再可用。
            - [ ] 已在 Release 说明中保留签名提示：当前安装包使用 `tauri-signing.key` 完成 Tauri 签名。
            - [ ] 已确认 Release assets 包含 `latest.json`、NSIS updater zip 和对应 `.sig` 签名。
            - [ ] 已在 Release 说明中保留升级提示：LiliaCode 会在启动后检查应用内自动更新，并在用户确认后安装新版。

            ## Windows 安装验证记录

            - 验证人：
            - 验证日期：
            - Windows 环境：
            - 安装包文件名：
            - 安装：
            - 启动：
            - CLI 入口：
            - 卸载：

            ## 已知限制

            - 当前只发布 Windows 安装包。
            - 当前安装包使用 `tauri-signing.key` 完成 Tauri 签名。
            - 当前不发布 macOS 公证包、macOS 安装包或 Linux 安装包。

      - name: Verify updater release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $release = gh release view "${{ steps.release_ref.outputs.tag }}" --json assets | ConvertFrom-Json
          $assetNames = @($release.assets | ForEach-Object { $_.name })
          if ($assetNames -notcontains "latest.json") {
            throw "Release is missing latest.json for Tauri updater."
          }
          if (-not ($assetNames | Where-Object { $_ -like "*.nsis.zip" })) {
            throw "Release is missing the NSIS updater zip."
          }
          if (-not ($assetNames | Where-Object { $_ -like "*.nsis.zip.sig" })) {
            throw "Release is missing the NSIS updater signature."
          }

      - name: Show sccache stats
        shell: pwsh
        run: "& $env:SCCACHE_PATH --show-stats"

  smoke-windows-installer:
    name: Smoke Windows installer
    needs: publish-windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Smoke draft Windows installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: corepack yarn release:smoke:windows --tag ${{ steps.release_ref.outputs.tag }}
